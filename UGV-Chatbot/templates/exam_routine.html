<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exam Routine — UGV Smart Assistant</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>

  <!-- ── Navbar ─────────────────────────────────────── -->
  <nav class="navbar">
    <div class="navbar-brand">
      <div class="logo-icon">🎓</div>
      <span>UGV Smart Assistant</span>
    </div>
    <div class="navbar-links">
      <a href="/"             class="nav-link"><span>💬</span> Chat</a>
      <a href="/exam-routine" class="nav-link active"><span>📋</span> Exam Routine</a>
      <a href="/admin"        class="nav-link"><span>⚙️</span> Admin</a>
      <button class="theme-toggle" id="themeToggle" title="Toggle theme">☀️</button>
    </div>
  </nav>

  <!-- ── Content ────────────────────────────────────── -->
  <div class="page-container">

    <h1 class="page-title">📋 Final Exam Routine</h1>
    <p class="page-subtitle">Winter-2026 · Department of Computer Science and Engineering (CSE) · University of Global Village</p>

    <!-- Filter Bar -->
    <div class="filter-bar">
      <input
        type="text"
        id="searchInput"
        placeholder="🔍 Search course name or code..."
      />
      <select id="semesterFilter">
        <option value="">All Semesters</option>
        {% for sem in semesters %}
        <option value="{{ sem.semester }}">Semester {{ sem.semester }}</option>
        {% endfor %}
      </select>
      <button class="btn btn-primary" onclick="loadExamRoutine(semesterFilter.value, searchInput.value)">
        Apply Filter
      </button>
    </div>

    <!-- Routine Table -->
    <div id="routineContainer">
      <div class="empty-state">
        <div class="icon">⏳</div>
        <p>Loading exam routine...</p>
      </div>
    </div>

    <!-- Legend -->
    <div style="margin-top:24px; display:flex; gap:20px; flex-wrap:wrap; color:var(--text-muted); font-size:0.85rem;">
      <span>⏰ = Days remaining</span>
      <span>⚡ = Hours remaining</span>
      <span>✅ = Completed</span>
      <span style="color:var(--danger)">Red countdown = 3 days or less</span>
    </div>

  </div>

  <script src="/static/script.js"></script>
</body>
</html>
